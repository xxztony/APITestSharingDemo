x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: jaeger:4317
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local-demo
  OTEL_TRACES_SAMPLER: always_on

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.3
    container_name: trading-demo-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8180
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    networks:
      - trading-demo

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.19.0
    container_name: trading-demo-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - trading-demo

  mysql:
    image: mysql:8.0
    container_name: trading-demo-mysql
    environment:
      MYSQL_DATABASE: trading_demo
      MYSQL_USER: demo_user
      MYSQL_PASSWORD: demo_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u demo_user -pdemo_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - trading-demo

  mongodb:
    image: mongo:7.0
    container_name: trading-demo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./database/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - trading-demo

  order-service:
    build: ./order-service
    container_name: trading-demo-order-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: order-service
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: trading_demo
      MYSQL_USER: demo_user
      MYSQL_PASSWORD: demo_password
    ports:
      - "8001:8001"
    depends_on:
      jaeger:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - trading-demo

  portfolio-service:
    build: ./portfolio-service
    container_name: trading-demo-portfolio-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: portfolio-service
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: trading_demo
      MYSQL_USER: demo_user
      MYSQL_PASSWORD: demo_password
    ports:
      - "8002:8002"
    depends_on:
      jaeger:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - trading-demo

  pricing-service:
    build: ./pricing-service
    container_name: trading-demo-pricing-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: pricing-service
    ports:
      - "50051:50051"
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - trading-demo

  test-runner-service:
    build: ./test-runner-service
    container_name: trading-demo-test-runner-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: test-runner-service
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DATABASE: qa_results
      ORDER_SERVICE_URL: http://order-service:8001
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8002/graphql
      PRICING_SERVICE_HOST: pricing-service
      PRICING_SERVICE_PORT: 50051
      BFF_URL: http://bff:8000
      IAM_TOKEN_URL: http://keycloak:8080/realms/trading-demo/protocol/openid-connect/token
      IAM_TEST_CLIENT_ID: trading-demo-tests
      IAM_TEST_USERNAME: qa.user
      IAM_TEST_PASSWORD: qa123456
      IAM_REFRESH_SKEW_SECONDS: 60
      RP_ENDPOINT: http://host.docker.internal:8080
      RP_PROJECT: superadmin_personal
      RP_API_KEY: ${RP_API_KEY:-}
    ports:
      - "8004:8004"
    depends_on:
      jaeger:
        condition: service_started
      mongodb:
        condition: service_healthy
      order-service:
        condition: service_started
      portfolio-service:
        condition: service_started
      pricing-service:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - trading-demo

  bff:
    build: ./bff
    container_name: trading-demo-bff
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: bff
      ORDER_SERVICE_URL: http://order-service:8001
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8002/graphql
      PRICING_SERVICE_HOST: pricing-service
      PRICING_SERVICE_PORT: 50051
      TEST_RUNNER_URL: http://test-runner-service:8004
      IAM_ISSUER: http://localhost:8180/realms/trading-demo
      IAM_JWKS_URL: http://keycloak:8080/realms/trading-demo/protocol/openid-connect/certs
      IAM_CLIENT_IDS: trading-demo-frontend,trading-demo-tests
    ports:
      - "8000:8000"
    depends_on:
      keycloak:
        condition: service_started
      jaeger:
        condition: service_started
      order-service:
        condition: service_started
      portfolio-service:
        condition: service_started
      pricing-service:
        condition: service_healthy
      test-runner-service:
        condition: service_started
    networks:
      - trading-demo

  frontend:
    build: ./frontend
    container_name: trading-demo-frontend
    environment:
      VITE_BFF_URL: http://localhost:8000
      VITE_KEYCLOAK_URL: http://localhost:8180
      VITE_KEYCLOAK_REALM: trading-demo
      VITE_KEYCLOAK_CLIENT_ID: trading-demo-frontend
    ports:
      - "3000:3000"
    depends_on:
      keycloak:
        condition: service_started
      bff:
        condition: service_started
    networks:
      - trading-demo

networks:
  trading-demo:
    driver: bridge

volumes:
  mysql-data:
  mongo-data:
